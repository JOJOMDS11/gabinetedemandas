<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Gabinete - Analytics</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Fonte mais moderna e limpa */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Fundo suave para dar contraste aos cartões brancos */
        body { background-color: #f8fafc; color: #0f172a; padding-bottom: 40px; }
        
        .navbar { background: #ffffff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100;}
        .navbar h1 { font-size: 18px; font-weight: 800; color: #0f172a; }
        .btn-voltar { background: #f1f5f9; color: #334155; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: background 0.2s; }
        .btn-voltar:hover { background: #e2e8f0; }

        .container { max-width: 1200px; margin: 40px auto 0; padding: 0 20px; }
        
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;}
        .page-header h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px;}
        .page-header p { color: #64748b; font-size: 14px; margin-top: 4px;}
        
        .btn-backup { background: #0f172a; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;}
        .btn-backup:hover { background: #334155; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);}

        /* Grid dos Números Grandes */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .kpi-titulo { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-valor { font-size: 40px; font-weight: 800; margin-top: 8px; line-height: 1; }
        
        .kpi-card.total .kpi-valor { color: #3b82f6; }
        .kpi-card.abertas .kpi-valor { color: #ef4444; }
        .kpi-card.andamento .kpi-valor { color: #f59e0b; }
        .kpi-card.concluidas .kpi-valor { color: #10b981; }

        /* Correção Definitiva dos Gráficos */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
        
        .chart-card { background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;}
        .chart-card h3 { font-size: 16px; font-weight: 600; color: #334155; margin-bottom: 20px; }
        
        /* A altura TRAVADA aqui impede o bug de redimensionamento do Chart.js */
        .chart-container { position: relative; height: 320px; width: 100%; }
        
        .chart-card.full-width { grid-column: 1 / -1; }
        .chart-card.full-width .chart-container { height: 350px; }

        /* Loading */
        #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 16px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="color: #0f172a; font-weight: 800;">Carregando Base de Dados...</h2>
    </div>

    <div class="navbar">
        <h1>📊 Dashboard Analítico</h1>
        <a href="dashboard.html" class="btn-voltar">Voltar ao Painel</a>
    </div>

    <div class="container">
        <div class="page-header">
            <div>
                <h2>Visão Geral do Gabinete</h2>
                <p>Métricas e volume de demandas em tempo real.</p>
            </div>
            <button class="btn-backup" onclick="gerarBackupJSON()">
                📥 Exportar Dados (Backup JSON)
            </button>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card total">
                <div class="kpi-titulo">Volume Total</div>
                <div class="kpi-valor" id="kpiTotal">0</div>
            </div>
            <div class="kpi-card abertas">
                <div class="kpi-titulo">Abertas / Aguardando</div>
                <div class="kpi-valor" id="kpiAbertas">0</div>
            </div>
            <div class="kpi-card andamento">
                <div class="kpi-titulo">Sendo Executadas</div>
                <div class="kpi-valor" id="kpiAndamento">0</div>
            </div>
            <div class="kpi-card concluidas">
                <div class="kpi-titulo">Finalizadas</div>
                <div class="kpi-valor" id="kpiConcluidas">0</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>Funil de Situação</h3>
                <div class="chart-container">
                    <canvas id="graficoStatus"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Carga de Trabalho (Equipe)</h3>
                <div class="chart-container">
                    <canvas id="graficoEquipe"></canvas>
                </div>
            </div>

            <div class="chart-card full-width">
                <h3>Tipos de Solicitações (Geral)</h3>
                <div class="chart-container">
                    <canvas id="graficoCategorias"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db;
        let todasDemandas = [];

        async function conectarBanco() {
            try {
                const authToken = localStorage.getItem('authToken');
                const res = await fetch('https://ypuniizmkadgoxhuzgxu.supabase.co/functions/v1/config');
                const config = await res.json();
                
                db = supabase.createClient(config.supabaseUrl, config.supabaseKey, {
                    global: { headers: authToken ? { Authorization: `Bearer ${authToken}` } : {} }
                });
                
                await carregarDados();
            } catch (err) {
                alert("Erro ao conectar no banco de dados.");
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function carregarDados() {
            const { data, error } = await db.from('demandas').select('*');
            if (!error) {
                todasDemandas = data || [];
                atualizarNumeros();
                desenharGraficos();
            }
            document.getElementById('loading').style.display = 'none';
        }

        function gerarBackupJSON() {
            if (todasDemandas.length === 0) return alert("Banco vazio.");
            const dataStr = JSON.stringify(todasDemandas, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Backup_Gabinete_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function atualizarNumeros() {
            let abertas = 0, andamento = 0, concluidas = 0;
            todasDemandas.forEach(d => {
                if (['Aberta', 'Pendente', 'Aguardando', 'Aguardando Aprovação'].includes(d.status)) abertas++;
                else if (['Concluída', 'Atendido', 'Resolvido', 'Arquivada', 'Rejeitada'].includes(d.status)) concluidas++;
                else andamento++;
            });

            document.getElementById('kpiTotal').textContent = todasDemandas.length;
            document.getElementById('kpiAbertas').textContent = abertas;
            document.getElementById('kpiAndamento').textContent = andamento;
            document.getElementById('kpiConcluidas').textContent = concluidas;
        }

        function desenharGraficos() {
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#64748b';

            // 1. Gráfico de Rosca (Status)
            const statusCounts = {};
            todasDemandas.forEach(d => { statusCounts[d.status] = (statusCounts[d.status] || 0) + 1; });
            
            new Chart(document.getElementById('graficoStatus'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(statusCounts),
                    datasets: [{
                        data: Object.values(statusCounts),
                        backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'],
                        borderWidth: 2,
                        borderColor: '#ffffff',
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, usePointStyle: true } } },
                    cutout: '70%'
                }
            });

            // 2. Gráfico de Equipe (Barras)
            const equipe = ['Daniel', 'João Pedro', 'Alemão', 'Antonio', 'Luana', 'Débora'];
            const equipeCounts = {};
            equipe.forEach(n => equipeCounts[n] = 0);

            todasDemandas.forEach(d => {
                const resps = d.responsaveis || [];
                resps.forEach(r => { if (equipeCounts[r] !== undefined) equipeCounts[r]++; });
            });

            const labelsEquipe = Object.keys(equipeCounts).filter(k => equipeCounts[k] > 0);
            const dataEquipe = labelsEquipe.map(k => equipeCounts[k]);

            new Chart(document.getElementById('graficoEquipe'), {
                type: 'bar',
                data: {
                    labels: labelsEquipe,
                    datasets: [{
                        label: 'Demandas Assumidas',
                        data: dataEquipe,
                        backgroundColor: '#3b82f6',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [4, 4], color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 3. Gráfico de Categorias (Horizontal)
            const catCounts = {};
            todasDemandas.forEach(d => { 
                let t = d.tipo_solicitacao || 'Sem categoria';
                catCounts[t] = (catCounts[t] || 0) + 1; 
            });
            const sortedCats = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);

            new Chart(document.getElementById('graficoCategorias'), {
                type: 'bar',
                data: {
                    labels: sortedCats,
                    datasets: [{
                        label: 'Volume',
                        data: sortedCats.map(k => catCounts[k]),
                        backgroundColor: '#10b981',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { borderDash: [4, 4], color: '#f1f5f9' } },
                        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
                    }
                }
            });
        }

        conectarBanco();
    </script>
</body>
</html>
